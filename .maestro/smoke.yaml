# E2E smoke test — launch, log an expense, see it in the list, check statistics.
#
# Prerequisites (same as captures/preview-kit): a dev-client build installed on
# the iOS Simulator with Metro running (`npm run ios` in another terminal), and
# Maestro installed (`brew install mobile-dev-inc/tap/maestro`).
#
# Run: npm run test:e2e
#
# Flows tap stable testIDs (iOS accessibilityIdentifier) so they are
# language-independent; the three native tabs expose no testID and are driven
# by coordinate taps (iOS 26 floating pill — recalibrate with `maestro hierarchy`
# if a tap misses; see captures/preview-kit/README.md).
appId: com.zii.flash.accounting
---
- launchApp
- tapOn:
    point: "66%,55%" # dev-client "Open" confirmation, when shown
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    point: "30%,94%" # Accounting tab
    optional: true
- waitForAnimationToEnd:
    timeout: 1200
# Log an expense.
- tapOn:
    id: "amount-input"
- inputText: "12.5"
- tapOn:
    id: "description-input"
- inputText: "Maestro smoke"
- waitForAnimationToEnd:
    timeout: 1200
- tapOn:
    id: "add-expense-button"
- waitForAnimationToEnd:
    timeout: 2000
# The new row springs into the list.
- assertVisible: "Maestro smoke"
# Statistics tab renders and the period filter responds.
- tapOn:
    point: "50%,94%" # Statistics tab
- waitForAnimationToEnd:
    timeout: 1800
- tapOn:
    id: "stat-time-week"
- waitForAnimationToEnd:
    timeout: 1200
- tapOn:
    id: "stat-time-month"
- waitForAnimationToEnd:
    timeout: 1200
